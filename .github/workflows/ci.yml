name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Unit tests
        run: pytest -q tests/test_auth.py tests/test_routing.py tests/test_validation.py
      - name: Lint
        run: ruff check app tests
