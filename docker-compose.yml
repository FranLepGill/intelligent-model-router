services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: router
      POSTGRES_PASSWORD: router
      POSTGRES_DB: model_router
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d model_router"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://router:router@db:5432/model_router
      DATABASE_URL_SYNC: postgresql://router:router@db:5432/model_router
      REDIS_URL: redis://redis:6379/0
      USE_MOCK_PROVIDERS: "true"
      SEED_DEMO_DATA: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  admin:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
